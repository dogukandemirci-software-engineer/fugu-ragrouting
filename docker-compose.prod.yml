services:
  postgres:
    image: ${DOCKERHUB_USERNAME}/fugu-postgres:${IMAGE_TAG:-latest}
    container_name: fugu-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-fugu}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-fugu}']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 300M
    networks:
      - fugu-net

  redis:
    image: redis:7-alpine
    container_name: fugu-redis
    restart: unless-stopped
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 80M
    networks:
      - fugu-net

  redpanda:
    image: redpandadata/redpanda:v24.2.7
    container_name: fugu-redpanda
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=200M
      - --overprovisioned
      - --node-id=0
      - --kafka-addr=PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ['CMD-SHELL', 'rpk cluster health | grep -q "Healthy:.*true"']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 250M
    networks:
      - fugu-net

  ollama:
    image: ollama/ollama:latest
    container_name: fugu-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ['CMD-SHELL', 'ollama list || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 300M
    networks:
      - fugu-net

  backend:
    image: ${DOCKERHUB_USERNAME}/fugu-backend:${IMAGE_TAG:-latest}
    container_name: fugu-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_PRICE_PRO_MONTHLY: ${STRIPE_PRICE_PRO_MONTHLY}
      STRIPE_PRICE_ENTERPRISE_MONTHLY: ${STRIPE_PRICE_ENTERPRISE_MONTHLY}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_FROM: ${SMTP_FROM}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_SECURE: ${SMTP_SECURE:-true}
      EMAIL_ENABLED: ${EMAIL_ENABLED:-true}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_EMBEDDING_MODEL: ${OPENROUTER_EMBEDDING_MODEL:-openai/text-embedding-3-small}
      COHERE_API_KEY: ${COHERE_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      # document_chunks stores embeddings in dimension-keyed columns (see
      # migration 009 and vector.repository.ts) so the platform is not locked
      # to one provider's output size. EMBEDDING_PROVIDER is ollama — this
      # account's Bedrock Titan v2 access throttles every request even at
      # wide intervals (new-account quota not yet effectively provisioned,
      # confirmed in both eu-north-1 and eu-west-1), so the platform default
      # runs against the local Ollama container instead: free, no external
      # quota, all-minilm (384-dim, ~45MB) sized to fit this instance's tight
      # RAM budget. S3_DOCUMENTS_BUCKET/AWS_REGION stay configured for the
      # document-storage path, which is unaffected by this. Revisit switching
      # EMBEDDING_PROVIDER back to bedrock if/when Bedrock quota is confirmed
      # working (see infra/terraform/iam.tf for the IAM policy, already
      # scoped to both regions). Entity extraction stays on openrouter; it
      # degrades gracefully (skips graph enrichment) rather than blocking
      # ingestion, so it isn't the urgent path to fix.
      EMBEDDING_PROVIDER: ollama
      ENTITY_EXTRACTION_PROVIDER: openrouter
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-all-minilm}
      OLLAMA_URL: http://ollama:11434
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-384}
      AWS_REGION: ${AWS_REGION:-eu-north-1}
      S3_DOCUMENTS_BUCKET: ${S3_DOCUMENTS_BUCKET}
      FRONTEND_URL: ${FRONTEND_URL}
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY}
      KAFKA_BROKERS: redpanda:29092
      INGESTION_QUEUE_ENABLED: 'true'
    volumes:
      # Legacy read-only path: documents uploaded before the S3 migration
      # only exist here — StorageService.read() falls back to this volume on
      # an S3 miss. New uploads go straight to S3, nothing new is written here.
      - backend_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://127.0.0.1:3001/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 250M
    networks:
      - fugu-net

  frontend:
    image: ${DOCKERHUB_USERNAME}/fugu-frontend:${IMAGE_TAG:-latest}
    container_name: fugu-frontend
    restart: unless-stopped
    ports:
      - '127.0.0.1:8080:80'
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 40M
    networks:
      - fugu-net

networks:
  fugu-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  redpanda_data:
  backend_storage:
  ollama_data:
