<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_THREEJS_START:ANIMATION_44 class="fixed inset-0 w-full h-full bg-transparent" -->
<div class="fixed inset-0 w-full h-full bg-transparent" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_44" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_44');
  const devicePixelRatio = window.devicePixelRatio || 1;
  const scene = new THREE.Scene();
const width = container.clientWidth || window.innerWidth;
const height = container.clientHeight || window.innerHeight;
const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });

renderer.setSize(width, height);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
container.appendChild(renderer.domElement);

// Abstract geometric data/node representation (Floating Sphere with wireframe)
const geometry = new THREE.IcosahedronGeometry(1.5, 2);
const material = new THREE.MeshPhongMaterial({
    color: 0x7037f1, // Fugu violet
    wireframe: true,
    transparent: true,
    opacity: 0.6,
    emissive: 0x7037f1,
    emissiveIntensity: 0.5
});

const coreGeometry = new THREE.IcosahedronGeometry(1.2, 1);
const coreMaterial = new THREE.MeshPhongMaterial({
    color: 0x1ef0e0, // Fugu teal
    transparent: true,
    opacity: 0.3,
});

const sphere = new THREE.Mesh(geometry, material);
const core = new THREE.Mesh(coreGeometry, coreMaterial);
scene.add(sphere);
scene.add(core);

const light = new THREE.PointLight(0xffffff, 1, 100);
light.position.set(5, 5, 5);
scene.add(light);

const ambientLight = new THREE.AmbientLight(0x404040);
scene.add(ambientLight);

camera.position.z = 5;

const mouse = new THREE.Vector2();
window.addEventListener('mousemove', (event) => {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
});

function animate() {
    requestAnimationFrame(animate);
    
    sphere.rotation.x += 0.002;
    sphere.rotation.y += 0.003;
    core.rotation.x -= 0.001;
    core.rotation.y -= 0.002;
    
    // Suble hover drift
    sphere.position.x += (mouse.x * 0.5 - sphere.position.x) * 0.05;
    sphere.position.y += (mouse.y * 0.5 - sphere.position.y) * 0.05;
    core.position.copy(sphere.position);

    renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
    const w = container.clientWidth || window.innerWidth;
    const h = container.clientHeight || window.innerHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
});

animate();
})();
</script>
</div>
<!-- STITCH_THREEJS_END:ANIMATION_44 -->
</body>
</html>
