<style>
        .brand-gradient-bg {
            background: linear-gradient(135deg, #7B2FF7 0%, #FF2E9A 100%);
            position: relative;
        }
        .brand-gradient-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(255,255,255,0.1) 0%, transparent 100%);
            border-radius: inherit;
            pointer-events: none;
        }
        .btn-primary:hover {
            box-shadow: inset 0 0 0 1px #3FFFC0, 0 0 10px rgba(123, 47, 247, 0.15);
        }
        
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(1.5); opacity: 0; }
        }
        .animate-pulse-ring::before {
            content: '';
            position: absolute;
            inset: -4px;
            border: 2px solid #7B2FF7;

<body class="h-full bg-background-alt text-on-background font-body-md flex items-center justify-center p-4">
<!-- Linear/Transactional state - no shell navigation -->
<main class="w-full max-w-md">
<div class="bg-surface-container-lowest border border-border-subtle rounded-lg p-8 md:p-12 text-center flex flex-col items-center">
<!-- Icon/Graphic -->
<div class="relative w-20 h-20 mb-8 rounded-full bg-surface-container-low flex items-center justify-center animate-pulse-ring mx-auto">
<span class="material-symbols-outlined text-[40px] text-accent-violet" style="font-variation-settings: 'FILL' 1;">
                    mark_email_unread
                </span>
</div>
<!-- Headers -->
<h1 class="font-headline-lg text-headline-lg text-primary mb-2">
                Check your inbox
            </h1>
<p class="font-body-md text-body-md text-on-surface-variant mb-8 max-w-xs mx-auto">
                We've sent a verification link to <br/>
<span class="font-semibold text-primary">developer@fugu.io</span>. 
                Please verify to continue setting up your workspace.
            </p>
<!-- Actions -->
<div class="flex flex-col gap-4 w-full">
<button class="btn-primary brand-gradient-bg text-on-primary font-body-sm text-body-sm h-12 rounded-[10px] w-full flex items-center justify-center transition-all">
                    Resend Verification Email
                </button>
<a class="font-body-sm text-body-sm text-on-surface-variant hover:text-primary transition-colors border-b border-transparent hover:border-primary inline-flex self-center mt-2" href="#">
                    Change email address
                </a>
</div>
<!-- Contextual Help -->
<div class="mt-12 pt-6 border-t border-border-subtle w-full">
<p class="font-body-sm text-body-sm text-on-tertiary-container flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[16px]">help</span>

                </p>
</div>
</div>

<div class="mt-8 text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
