version: '3.9'

services:
  # Custom Postgres with pgvector + Apache AGE
  postgres:
    build:
      context: ./backend
      dockerfile: docker/postgres.Dockerfile
    container_name: fugu-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fugu
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d fugu']
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (cache + rate limiting)
  redis:
    image: redis:7-alpine
    container_name: fugu-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # Redpanda (Kafka-compatible queue for document ingestion)
  redpanda:
    image: redpandadata/redpanda:v24.2.7
    container_name: fugu-redpanda
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=512M
      - --overprovisioned
      - --node-id=0
      - --kafka-addr=PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
    ports:
      - '9092:9092'
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ['CMD-SHELL', 'rpk cluster health | grep -q "Healthy:.*true"']
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile
    container_name: fugu-backend
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/fugu
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: dev-access-secret-min-32-chars-long
      JWT_REFRESH_SECRET: dev-refresh-secret-min-32-chars-long
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      SUPABASE_URL: http://localhost:54321
      FRONTEND_URL: http://localhost:5173
      EMBEDDING_MODEL: text-embedding-3-small
      EMBEDDING_DIMENSIONS: '1536'
      KAFKA_BROKERS: redpanda:29092
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev

volumes:
  postgres_data:
  redis_data:
  redpanda_data:
